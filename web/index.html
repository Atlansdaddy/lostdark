<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#020205" />
    <title>wAIver</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #020205;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #7fe3ff;
        letter-spacing: 0.3em;
        font-size: 12px;
        text-transform: uppercase;
        animation: breathe 2.4s ease-in-out infinite;
      }
      @keyframes breathe {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }
      #light-toggle {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 60;
        padding: 6px 11px;
        font: 12px ui-monospace, Menlo, Consolas, monospace;
        letter-spacing: 0.03em;
        color: #8dffd2;
        background: rgba(8, 14, 12, 0.72);
        border: 1px solid rgba(141, 255, 210, 0.3);
        border-radius: 6px;
        cursor: pointer;
      }
      #light-toggle.on {
        border-color: rgba(141, 255, 210, 0.85);
        background: rgba(12, 26, 20, 0.82);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">wAIver</div>
    <button id="light-toggle" type="button">○ Light: Baked</button>
    <script type="module" src="/src/main.ts"></script>
    <script>
      (function () {
        var on = false;
        var btn = document.getElementById('light-toggle');
        btn.addEventListener('click', function () {
          on = !on;
          if (window.waiver && window.waiver.lightVol) window.waiver.lightVol(on ? 1 : 0);
          btn.textContent = on ? '◉ Light: Volume (3D)' : '○ Light: Baked';
          btn.classList.toggle('on', on);
        });
      })();
    </script>
  </body>
</html>
